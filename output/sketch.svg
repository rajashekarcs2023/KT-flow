<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
    <defs>
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2" />
            <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="wet-reflection" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="10 1" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" opacity="0.6"/>
            </feMerge>
        </filter>
        <filter id="slight-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <style>
        path, line {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .sketch {
            stroke-dasharray: 1.01;
            stroke-dashoffset: 1.01;
            animation: draw 2.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .d1 { animation-delay: 0.2s; }
        .d2 { animation-delay: 0.8s; }
        .d3 { animation-delay: 1.4s; }
        .d4 { animation-delay: 2.0s; }
        .d5 { animation-delay: 2.6s; }
        .d6 { animation-delay: 3.2s; }

        @keyframes draw {
            100% { stroke-dashoffset: 0; }
        }

        .bg-line { stroke: #3a3a5a; stroke-width: 1.5; }
        .wire { stroke: #2a2a40; stroke-width: 1; }

        .neon-pink { stroke: #ff2a7a; stroke-width: 2; filter: url(#neon-glow); }
        .neon-cyan { stroke: #00f0ff; stroke-width: 2; filter: url(#neon-glow); }
        .neon-lime { stroke: #39ff14; stroke-width: 2; filter: url(#neon-glow); }
        .neon-orange { stroke: #ff7700; stroke-width: 2; filter: url(#neon-glow); }
        .neon-yellow { stroke: #ffee00; stroke-width: 2; filter: url(#neon-glow); }
        .neon-purple { stroke: #b026ff; stroke-width: 2; filter: url(#neon-glow); }

        .reflection { stroke-width: 2; opacity: 0.7; filter: url(#wet-reflection); }
        .ref-pink { stroke: #ff2a7a; }
        .ref-cyan { stroke: #00f0ff; }
        .ref-lime { stroke: #39ff14; }
        .ref-orange { stroke: #ff7700; }
        .ref-yellow { stroke: #ffee00; }
        .ref-purple { stroke: #b026ff; }
        .ref-white { stroke: #aaccff; }

        .figure { stroke: #cce0ff; stroke-width: 2; filter: url(#slight-glow); }
        .dist-figure { stroke: #6a7a9a; stroke-width: 1.5; }

        .rain line {
            stroke: #8ab0d0;
            stroke-width: 1;
            stroke-dasharray: 0.15 0.85;
            animation: rainFall 0.7s linear infinite;
            opacity: 0;
        }
        .r1 line { animation-delay: 0s; }
        .r2 line { animation-delay: 0.25s; }
        .r3 line { animation-delay: 0.5s; }

        @keyframes rainFall {
            0% { stroke-dashoffset: 1; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
    </style>

    <rect width="100%" height="100%" fill="#0a0a0f" />

    <path class="sketch bg-line d1" pathLength="1" d="M150,450 L370,230 M650,450 L430,230 M50,450 L350,230 M750,450 L450,230 M50,450 L50,0 M150,380 L150,0 M250,300 L250,0 M350,230 L350,50 M750,450 L750,0 M650,380 L650,0 M550,300 L550,0 M450,230 L450,50 M50,200 L150,170 M150,170 L250,150 M250,150 L350,140 M750,150 L650,130 M650,130 L550,120 M550,120 L450,110 M153,450 L370,232 M647,450 L430,232 M400,430 L400,390 M400,350 L400,310 M400,280 L400,260 M400,245 L400,235" />
    
    <path class="sketch bg-line d2" pathLength="1" d="M60,300 L140,270 M60,320 L140,290 M60,340 L140,310 M160,250 L240,230 M160,270 L240,250 M740,300 L660,270 M740,320 L660,290 M640,250 L560,230 M640,270 L560,250 M370,230 L370,200 L385,200 L385,180 L400,180 L400,190 L415,190 L415,210 L430,210 L430,230 M250,100 L400,100 L400,120 L250,120 Z M550,80 L430,80 L430,110 L550,110 Z M270,110 L380,110 M450,95 L530,95" />
    
    <path class="sketch wire d2" pathLength="1" d="M50,80 Q400,180 750,100 M150,120 Q400,200 650,140 M250,160 Q400,220 550,170 M50,90 Q400,190 750,110" />

    <path class="sketch neon-pink d3" pathLength="1" d="M80,50 L130,70 L130,280 L80,310 Z M105,90 L120,95 M100,110 L125,120 M112,115 L112,140 M100,150 C110,150 120,160 115,175 M105,190 L120,195 M112,185 L112,210 M100,230 L125,240 M100,260 L120,270" />
    <path class="sketch neon-cyan d3" pathLength="1" d="M200,120 L230,130 L230,240 L200,250 Z M215,145 L215,160 M208,152 L222,152 M210,175 L220,180 M215,195 C220,200 220,210 210,215 M215,225 L215,235" />
    <path class="sketch neon-yellow d3" pathLength="1" d="M290,160 L310,165 L310,220 L290,225 Z M300,175 L300,185 M300,195 L300,205" />

    <path class="sketch neon-lime d4" pathLength="1" d="M720,30 L660,60 L660,300 L720,340 Z M690,80 L690,110 M675,95 L705,95 M680,130 L700,130 M680,145 L700,145 M690,130 L690,160 M680,180 C690,170 700,170 700,190 C700,210 680,210 680,230 M685,250 L700,260 M680,270 L705,280" />
    <path class="sketch neon-orange d4" pathLength="1" d="M560,110 L520,125 L520,230 L560,245 Z M540,140 L540,155 M530,147 L550,147 M535,170 L545,175 M540,172 L540,190 M535,205 L545,210 M535,220 L545,225" />
    <path class="sketch neon-purple d4" pathLength="1" d="M460,150 L440,158 L440,210 L460,215 Z M450,170 L450,180 M450,190 L450,200 M395,210 L405,210 L405,220 L395,220 Z" />

    <path class="sketch reflection ref-pink d5" pathLength="1" d="M70,330 L140,330 M60,350 L160,350 M80,360 L150,360 M50,380 L180,380 M70,390 L190,390 M40,410 L210,410 M80,425 L220,425" />
    <path class="sketch reflection ref-cyan d5" pathLength="1" d="M190,260 L240,260 M180,275 L260,275 M195,285 L255,285 M170,305 L280,305 M185,320 L290,320" />
    <path class="sketch reflection ref-yellow d5" pathLength="1" d="M270,240 L330,240 M260,255 L340,255" />
    <path class="sketch reflection ref-lime d5" pathLength="1" d="M650,360 L730,360 M630,380 L750,380 M640,395 L760,395 M600,420 L780,420 M620,435 L790,435" />
    <path class="sketch reflection ref-orange d5" pathLength="1" d="M510,260 L570,260 M490,280 L590,280 M500,295 L600,295 M470,320 L620,320 M480,335 L630,335" />
    <path class="sketch reflection ref-purple d5" pathLength="1" d="M430,230 L470,230 M420,240 L480,240 M435,250 L465,250" />

    <path class="sketch dist-figure d5" pathLength="1" d="M370,240 C370,230 380,230 380,240 Z M375,240 L375,255 M375,255 L372,265 M375,255 L378,265 M420,250 C420,240 430,240 430,250 Z M425,250 L425,265 M425,265 L422,275 M425,265 L428,275" />

    <path class="sketch figure d6" pathLength="1" d="M360,310 C360,270 440,270 440,310 M360,310 Q380,305 400,310 Q420,305 440,310 M400,310 L400,345 C400,350 405,350 405,345 M400,325 L400,370 M400,370 L385,410 M400,370 L410,405 L420,410 M400,335 L385,355 L395,365" />
    <path class="sketch reflection ref-white d6" pathLength="1" d="M380,420 L420,420 M375,430 L425,430 M370,440 L430,440" />

    <g class="rain r1">
        <line x1="100" y1="-50" x2="0" y2="150" pathLength="1"/>
        <line x1="300" y1="-20" x2="200" y2="180" pathLength="1"/>
        <line x1="500" y1="-80" x2="400" y2="120" pathLength="1"/>
        <line x1="700" y1="-10" x2="600" y2="190" pathLength="1"/>
        <line x1="900" y1="-60" x2="800" y2="140" pathLength="1"/>
        <line x1="200" y1="200" x2="100" y2="400" pathLength="1"/>
        <line x1="600" y1="250" x2="500" y2="450" pathLength="1"/>
        <line x1="350" y1="80" x2="250" y2="280" pathLength="1"/>
        <line x1="850" y1="170" x2="750" y2="370" pathLength="1"/>
    </g>
    <g class="rain r2">
        <line x1="200" y1="-50" x2="100" y2="150" pathLength="1"/>
        <line x1="400" y1="-30" x2="300" y2="170" pathLength="1"/>
        <line x1="600" y1="-70" x2="500" y2="130" pathLength="1"/>
        <line x1="800" y1="-20" x2="700" y2="180" pathLength="1"/>
        <line x1="1000" y1="-90" x2="900" y2="110" pathLength="1"/>
        <line x1="300" y1="220" x2="200" y2="420" pathLength="1"/>
        <line x1="700" y1="280" x2="600" y2="480" pathLength="1"/>
        <line x1="500" y1="300" x2="400" y2="500" pathLength="1"/>
        <line x1="150" y1="100" x2="50" y2="300" pathLength="1"/>
    </g>
    <g class="rain r3">
        <line x1="150" y1="-10" x2="50" y2="190" pathLength="1"/>
        <line x1="350" y1="-60" x2="250" y2="140" pathLength="1"/>
        <line x1="550" y1="-40" x2="450" y2="160" pathLength="1"/>
        <line x1="750" y1="-80" x2="650" y2="120" pathLength="1"/>
        <line x1="950" y1="-50" x2="850" y2="150" pathLength="1"/>
        <line x1="400" y1="260" x2="300" y2="460" pathLength="1"/>
        <line x1="800" y1="240" x2="700" y2="440" pathLength="1"/>
        <line x1="900" y1="300" x2="800" y2="500" pathLength="1"/>
        <line x1="650" y1="90" x2="550" y2="290" pathLength="1"/>
    </g>
</svg>