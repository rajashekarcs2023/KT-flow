<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <defs>
        <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7000FF" />
            <stop offset="33%" stop-color="#D400FF" />
            <stop offset="66%" stop-color="#00D4FF" />
            <stop offset="100%" stop-color="#00FFB3" />
        </linearGradient>
        
        <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#090712" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#090712" stop-opacity="1" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <style>
            .bar {
                transform-box: fill-box;
                transform-origin: bottom;
                fill: url(#barGrad);
                animation-iteration-count: infinite;
                animation-timing-function: ease-in-out;
            }
            
            @keyframes eq1 {
                0%   { transform: scaleY(0.1); }
                20%  { transform: scaleY(0.9); }
                40%  { transform: scaleY(0.3); }
                60%  { transform: scaleY(1.0); }
                80%  { transform: scaleY(0.4); }
                100% { transform: scaleY(0.1); }
            }
            @keyframes eq2 {
                0%   { transform: scaleY(0.2); }
                25%  { transform: scaleY(1.0); }
                50%  { transform: scaleY(0.4); }
                75%  { transform: scaleY(0.8); }
                100% { transform: scaleY(0.2); }
            }
            @keyframes eq3 {
                0%   { transform: scaleY(0.15); }
                30%  { transform: scaleY(0.6); }
                50%  { transform: scaleY(1.0); }
                70%  { transform: scaleY(0.3); }
                100% { transform: scaleY(0.15); }
            }
            @keyframes eq4 {
                0%   { transform: scaleY(0.3); }
                35%  { transform: scaleY(0.8); }
                65%  { transform: scaleY(0.2); }
                85%  { transform: scaleY(1.0); }
                100% { transform: scaleY(0.3); }
            }
        </style>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#090712" />

    <!-- Floor Line -->
    <line x1="20" y1="330" x2="780" y2="330" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>

    <!-- Equalizer Bars -->
    <g id="bars" filter="url(#glow)">
        <rect class="bar" x="45" y="280" width="20" height="50" rx="10" style="animation-name: eq1; animation-duration: 1.2s; animation-delay: -0.5s;" />
        <rect class="bar" x="75" y="260" width="20" height="70" rx="10" style="animation-name: eq2; animation-duration: 1.5s; animation-delay: -0.2s;" />
        <rect class="bar" x="105" y="230" width="20" height="100" rx="10" style="animation-name: eq3; animation-duration: 1.1s; animation-delay: -0.8s;" />
        <rect class="bar" x="135" y="200" width="20" height="130" rx="10" style="animation-name: eq4; animation-duration: 1.4s; animation-delay: -0.1s;" />
        <rect class="bar" x="165" y="160" width="20" height="170" rx="10" style="animation-name: eq1; animation-duration: 1.3s; animation-delay: -0.6s;" />
        <rect class="bar" x="195" y="120" width="20" height="210" rx="10" style="animation-name: eq2; animation-duration: 1.6s; animation-delay: -0.3s;" />
        <rect class="bar" x="225" y="90" width="20" height="240" rx="10" style="animation-name: eq3; animation-duration: 1.2s; animation-delay: -0.9s;" />
        <rect class="bar" x="255" y="70" width="20" height="260" rx="10" style="animation-name: eq4; animation-duration: 1.5s; animation-delay: -0.4s;" />
        <rect class="bar" x="285" y="50" width="20" height="280" rx="10" style="animation-name: eq1; animation-duration: 1.1s; animation-delay: -0.7s;" />
        <rect class="bar" x="315" y="40" width="20" height="290" rx="10" style="animation-name: eq2; animation-duration: 1.4s; animation-delay: -0.2s;" />
        <rect class="bar" x="345" y="30" width="20" height="300" rx="10" style="animation-name: eq3; animation-duration: 1.3s; animation-delay: -0.8s;" />
        <rect class="bar" x="375" y="30" width="20" height="300" rx="10" style="animation-name: eq4; animation-duration: 1.6s; animation-delay: -0.1s;" />
        <rect class="bar" x="405" y="40" width="20" height="290" rx="10" style="animation-name: eq1; animation-duration: 1.2s; animation-delay: -0.6s;" />
        <rect class="bar" x="435" y="50" width="20" height="280" rx="10" style="animation-name: eq2; animation-duration: 1.5s; animation-delay: -0.3s;" />
        <rect class="bar" x="465" y="70" width="20" height="260" rx="10" style="animation-name: eq3; animation-duration: 1.1s; animation-delay: -0.9s;" />
        <rect class="bar" x="495" y="90" width="20" height="240" rx="10" style="animation-name: eq4; animation-duration: 1.4s; animation-delay: -0.4s;" />
        <rect class="bar" x="525" y="120" width="20" height="210" rx="10" style="animation-name: eq1; animation-duration: 1.3s; animation-delay: -0.7s;" />
        <rect class="bar" x="555" y="160" width="20" height="170" rx="10" style="animation-name: eq2; animation-duration: 1.6s; animation-delay: -0.2s;" />
        <rect class="bar" x="585" y="200" width="20" height="130" rx="10" style="animation-name: eq3; animation-duration: 1.2s; animation-delay: -0.8s;" />
        <rect class="bar" x="615" y="230" width="20" height="100" rx="10" style="animation-name: eq4; animation-duration: 1.5s; animation-delay: -0.1s;" />
        <rect class="bar" x="645" y="260" width="20" height="70" rx="10" style="animation-name: eq1; animation-duration: 1.1s; animation-delay: -0.6s;" />
        <rect class="bar" x="675" y="280" width="20" height="50" rx="10" style="animation-name: eq2; animation-duration: 1.4s; animation-delay: -0.3s;" />
        <rect class="bar" x="705" y="290" width="20" height="40" rx="10" style="animation-name: eq3; animation-duration: 1.3s; animation-delay: -0.9s;" />
        <rect class="bar" x="735" y="300" width="20" height="30" rx="10" style="animation-name: eq4; animation-duration: 1.6s; animation-delay: -0.4s;" />
    </g>

    <!-- Floor Reflection -->
    <use href="#bars" transform="translate(0, 660) scale(1, -1)" opacity="0.35" />
    <rect x="0" y="330" width="800" height="70" fill="url(#fadeGrad)" />
</svg>